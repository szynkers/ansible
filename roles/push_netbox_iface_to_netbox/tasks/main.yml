- name: Pobierz interfejsy urządzenia z NetBox (REST)
  delegate_to: localhost
  check_mode: false
  ansible.builtin.uri:
    url: "{{ netbox_url }}/api/dcim/interfaces/?device={{ inventory_hostname | urlencode }}&limit=0"
    method: GET
    headers:
      Authorization: "Token {{ netbox_token }}"
      Accept: "application/json"
    validate_certs: false
  register: nb_ifaces_raw

- name: Zbuduj mapę konfiguracji portów z NetBox
  check_mode: false
  set_fact:
    nb_iface_cfg_map: "{{ nb_iface_cfg_map | default({}) | combine({ item.name: iface_cfg }) }}"
  vars:
    iface_connected_device_name: >-
      {{
        (
          item.connected_endpoints | default([])
          | map(attribute='device', default={})
          | map(attribute='name', default='')
          | map('string')
          | map('trim')
          | reject('equalto', '')
          | list
          | first
        ) | default('')
      }}

    iface_desc: >-
      {{
        iface_connected_device_name
        if (iface_connected_device_name | length > 0)
        else (item.description | default('') | string | trim)
      }}

    iface_mode: "{{ item.mode.value | default('') }}"

    iface_access_vlan: >-
      {{
        item.untagged_vlan.vid
        if (item.untagged_vlan is defined and item.untagged_vlan)
        else ''
      }}

    iface_trunk_vlans: >-
      {{
        item.tagged_vlans | default([])
        | map(attribute='vid')
        | map('string')
        | list
        | join(',')
      }}

    iface_tags: >-
      {{
        item.tags | default([])
        | map(attribute='name')
        | map('lower')
        | list
      }}

    iface_enabled: "{{ item.enabled | default(true) | bool }}"

    iface_cfg:
      description: "{{ iface_desc }}"
      mode: "{{ iface_mode }}"
      access_vlan: "{{ iface_access_vlan }}"
      trunk_vlans: "{{ iface_trunk_vlans }}"
      tags: "{{ iface_tags }}"
      enabled: "{{ iface_enabled }}"
  loop: "{{ nb_ifaces_raw.json.results | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Upewnij się, że mapa istnieje
  set_fact:
    nb_iface_cfg_map: "{{ nb_iface_cfg_map | default({}) }}"

- name: Debug - mapa konfiguracji portów
  debug:
    var: nb_iface_cfg_map

- name: Pokaż porty z tagiem critical-port
  debug:
    msg: "Port {{ item.key }} ma tag 'critical-port' i zostanie pominięty w konfiguracji."
  loop: "{{ nb_iface_cfg_map | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - "'critical-port' in (item.value.tags | default([]))"

- name: Debug - komendy dla portów
  debug:
    msg: "{{ port_commands }}"
  vars:
    port_commands: >-
      {{
        ['conf t', 'int ' ~ item.key]
        +
        (
          ['description "' ~ (item.value.description | replace('"', '')) ~ '"']
          if item.value.description | string | trim | length > 0
          else
          ['no description']
        )
        +
        (
          ['switchport mode access']
          if item.value.mode == 'access'
          else
          ['switchport mode trunk']
          if item.value.mode == 'tagged'
          else
          []
        )
        +
        (
          (
            ['switchport access vlan ' ~ (item.value.access_vlan | string)]
            if item.value.access_vlan | string | trim | length > 0
            else
            ['no switchport access vlan']
          )
          if item.value.mode == 'access'
          else
          []
        )
        +
        (
          (
            ['switchport trunk native vlan ' ~ (item.value.access_vlan | string)]
            if item.value.access_vlan | string | trim | length > 0
            else
            ['no switchport trunk native vlan']
          )
          if item.value.mode == 'tagged'
          else
          []
        )
        +
        (
          (
            ['switchport trunk allowed vlan ' ~ item.value.trunk_vlans]
            if item.value.trunk_vlans | string | trim | length > 0
            else
            ['no switchport trunk allowed vlan']
          )
          if item.value.mode == 'tagged'
          else
          []
        )
        +
        (
          ['no shutdown']
          if item.value.enabled | default(true) | bool
          else
          ['shutdown']
        )
        +
        ['end']
      }}
  loop: "{{ nb_iface_cfg_map | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - "'critical-port' not in (item.value.tags | default([]))"

- name: Skonfiguruj opisy portów zgodnie z NetBox
  community.ciscosmb.command:
    commands: "{{ port_commands }}"
  vars:
    port_commands: >-
      {{
        ['conf t', 'int ' ~ item.key]
        +
        (
          ['description "' ~ (item.value.description | replace('"', '')) ~ '"']
          if item.value.description | string | trim | length > 0
          else
          ['no description']
        )
  loop: "{{ nb_iface_cfg_map | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - not ansible_check_mode

- name: Skonfiguruj porty zgodnie z NetBox oprócz tych z tagiem critical-port
  community.ciscosmb.command:
    commands: "{{ port_commands }}"
  vars:
    port_commands: >-
      {{
        ['conf t', 'int ' ~ item.key]
        +
        (
          ['switchport mode access']
          if item.value.mode == 'access'
          else
          ['switchport mode trunk']
          if item.value.mode == 'tagged'
          else
          []
        )
        +
        (
          (
            ['switchport access vlan ' ~ (item.value.access_vlan | string)]
            if item.value.access_vlan | string | trim | length > 0
            else
            ['no switchport access vlan']
          )
          if item.value.mode == 'access'
          else
          []
        )
        +
        (
          (
            ['switchport trunk native vlan ' ~ (item.value.access_vlan | string)]
            if item.value.access_vlan | string | trim | length > 0
            else
            ['no switchport trunk native vlan']
          )
          if item.value.mode == 'tagged'
          else
          []
        )
        +
        (
          (
            ['switchport trunk allowed vlan ' ~ item.value.trunk_vlans]
            if item.value.trunk_vlans | string | trim | length > 0
            else
            ['no switchport trunk allowed vlan']
          )
          if item.value.mode == 'tagged'
          else
          []
        )
        +
        (
          ['no shutdown']
          if item.value.enabled | default(true) | bool
          else
          ['shutdown']
        )
        +
        ['end']
      }}
  loop: "{{ nb_iface_cfg_map | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - not ansible_check_mode
    - "'critical-port' not in (item.value.tags | default([]))"

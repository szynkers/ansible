---

- name: Uruchom "show startup-config"
    ansible.netcommon.cli_command:
      command: show startup-config
    register: startup_cfg
- name: Debug host target
  debug:
    msg:
      - "inventory_hostname={{ inventory_hostname }}"
      - "ansible_host={{ ansible_host | default('UNDEF') }}"
      - "ansible_network_os={{ ansible_network_os | default('UNDEF') }}"
      - "ansible_connection={{ ansible_connection | default('UNDEF') }}"


---
- name: Export Cisco SMB interface descriptions to CSV
  hosts: switches
  gather_facts: no

  tasks:
    - name: Run "show interfaces description"
      community.ciscosmb.command:
        commands:
          - show system
      register: run_cfg

  tasks:
    - name: Run "show interfaces description"
      community.ciscosmb.command:
        commands:
          - show interfaces description
      register: iface_out
